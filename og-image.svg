<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a" />
      <stop offset="50%" style="stop-color:#1e293b" />
      <stop offset="100%" style="stop-color:#0f172a" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6" />
      <stop offset="100%" style="stop-color:#6366f1" />
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316" />
      <stop offset="100%" style="stop-color:#ef4444" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" rx="0"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="white" stroke-width="1"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="200" fill="#3b82f6" opacity="0.05"/>
  <circle cx="150" cy="500" r="150" fill="#f97316" opacity="0.05"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo area -->
  <g transform="translate(80, 60)">
    <rect width="48" height="48" rx="12" fill="url(#accent)"/>
    <text x="24" y="32" font-family="sans-serif" font-size="24" font-weight="900" fill="white" text-anchor="middle">S</text>
    <text x="64" y="36" font-family="sans-serif" font-size="22" font-weight="900" fill="white" letter-spacing="2">SEARCH HOUSE</text>
  </g>

  <!-- Main headline -->
  <text x="80" y="200" font-family="sans-serif" font-size="52" font-weight="900" fill="white" letter-spacing="-1">
    매일 왕복 2시간 통근 =
  </text>

  <!-- Stats row -->
  <g transform="translate(80, 240)">
    <text font-family="sans-serif" font-size="68" font-weight="900" fill="url(#orange)" letter-spacing="-2">
      연간 480시간
    </text>
    <text x="540" font-family="sans-serif" font-size="68" font-weight="900" fill="white" letter-spacing="-2" opacity="0.5">
      =
    </text>
    <text x="600" font-family="sans-serif" font-size="68" font-weight="900" fill="url(#orange)" letter-spacing="-2">
      20일
    </text>
  </g>

  <!-- Sub headline -->
  <text x="80" y="340" font-family="sans-serif" font-size="36" font-weight="700" fill="#94a3b8" letter-spacing="-0.5">
    당신의 시간은 얼마인가요?
  </text>

  <!-- Divider -->
  <rect x="80" y="380" width="120" height="4" rx="2" fill="url(#accent)"/>

  <!-- Features -->
  <g transform="translate(80, 420)">
    <circle cx="8" cy="8" r="6" fill="#3b82f6"/>
    <text x="24" y="14" font-family="sans-serif" font-size="20" font-weight="700" fill="#cbd5e1">인생 시급 기반 통근 기회비용 산출</text>
  </g>
  <g transform="translate(80, 460)">
    <circle cx="8" cy="8" r="6" fill="#3b82f6"/>
    <text x="24" y="14" font-family="sans-serif" font-size="20" font-weight="700" fill="#cbd5e1">수도권 620+ 역세권 실거래가 분석</text>
  </g>
  <g transform="translate(80, 500)">
    <circle cx="8" cy="8" r="6" fill="#3b82f6"/>
    <text x="24" y="14" font-family="sans-serif" font-size="20" font-weight="700" fill="#cbd5e1">피로도 가중치 모델 (Fatigue Model v1.0)</text>
  </g>

  <!-- Right side card -->
  <g transform="translate(720, 380)">
    <rect width="400" height="200" rx="20" fill="white" opacity="0.05"/>
    <rect x="20" y="20" width="170" height="80" rx="12" fill="white" opacity="0.08"/>
    <text x="105" y="50" font-family="sans-serif" font-size="11" font-weight="800" fill="#94a3b8" text-anchor="middle">실제 지출</text>
    <text x="105" y="80" font-family="sans-serif" font-size="28" font-weight="900" fill="white" text-anchor="middle">87<tspan font-size="14" fill="#64748b">만</tspan></text>

    <rect x="210" y="20" width="170" height="80" rx="12" fill="#f97316" opacity="0.15"/>
    <text x="295" y="50" font-family="sans-serif" font-size="11" font-weight="800" fill="#fb923c" text-anchor="middle">보이지 않는 비용</text>
    <text x="295" y="80" font-family="sans-serif" font-size="28" font-weight="900" fill="#f97316" text-anchor="middle">142<tspan font-size="14" fill="#fb923c">만</tspan></text>

    <text x="200" y="140" font-family="sans-serif" font-size="14" font-weight="700" fill="#64748b" text-anchor="middle">보이지 않는 비용이 진짜 비용입니다</text>
    <text x="200" y="170" font-family="sans-serif" font-size="18" font-weight="900" fill="white" text-anchor="middle">지금 확인하기 →</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="white" opacity="0.03"/>
  <text x="80" y="616" font-family="sans-serif" font-size="14" font-weight="600" fill="#475569">search-house.onrender.com</text>
  <text x="1120" y="616" font-family="sans-serif" font-size="14" font-weight="600" fill="#475569" text-anchor="end">국토교통부 공식 실거래가 기반</text>
</svg>
