<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 도시 스카이라인 배경 (라인 아트) -->
  <g fill="none" stroke="white" stroke-width="1" opacity="0.05">
    <path d="M0 600 L100 600 L100 450 L150 450 L150 520 L200 520 L200 380 L280 380 L280 500 L350 500 L350 420 L420 420 L420 600 L500 600 L500 350 L580 350 L580 550 L650 550 L650 400 L720 400 L720 600 L800 600 L800 300 L900 300 L900 500 L980 500 L980 430 L1050 430 L1050 600 L1200 600"/>
    <rect x="120" y="480" width="20" height="20" rx="2"/>
    <rect x="220" y="410" width="20" height="20" rx="2"/>
    <rect x="520" y="380" width="20" height="20" rx="2"/>
    <rect x="820" y="330" width="20" height="20" rx="2"/>
  </g>

  <!-- 로고 -->
  <g transform="translate(80, 60)">
    <rect width="50" height="50" rx="12" fill="url(#accent)"/>
    <text x="25" y="35" font-family="sans-serif" font-size="28" font-weight="900" fill="white" text-anchor="middle">S</text>
    <text x="70" y="36" font-family="sans-serif" font-size="24" font-weight="900" fill="white" letter-spacing="2">SEARCH HOUSE</text>
  </g>

  <!-- 메인 카피 -->
  <text x="80" y="200" font-family="sans-serif" font-size="52" font-weight="900" fill="white" letter-spacing="-1">
    매일 왕복 2시간 통근 시
  </text>
  <text x="80" y="310" font-family="sans-serif" font-size="96" font-weight="900" fill="#3b82f6" letter-spacing="-3">
    월 100만원이 증발합니다
  </text>

  <!-- 기준 정보 -->
  <g transform="translate(80, 360)">
    <rect width="320" height="40" rx="20" fill="white" opacity="0.1"/>
    <text x="160" y="26" font-family="sans-serif" font-size="18" font-weight="700" fill="#94a3b8" text-anchor="middle">
      연봉 5,000만원 · 1인 가구 기준
    </text>
  </g>

  <!-- 카드 영역 (가로 배치) -->
  <g transform="translate(80, 440)">
    <rect width="1040" height="120" rx="24" fill="white" opacity="0.05" stroke="white" stroke-width="1" stroke-opacity="0.1"/>
    
    <g transform="translate(40, 35)">
      <text font-family="sans-serif" font-size="18" font-weight="800" fill="#64748b" text-transform="uppercase">기회비용 분석</text>
      <text y="45" font-family="sans-serif" font-size="36" font-weight="900" fill="white">인생 시급 기반 최적 주거지 추천</text>
    </g>

    <g transform="translate(700, 30)">
      <rect width="300" height="60" rx="30" fill="url(#accent)"/>
      <text x="150" y="38" font-family="sans-serif" font-size="22" font-weight="900" fill="white" text-anchor="middle">지금 계산하기 →</text>
    </g>
  </g>

  <!-- 푸터 -->
  <text x="80" y="605" font-family="sans-serif" font-size="16" font-weight="600" fill="#475569">
    수도권 620+ 역세권 분석  ·  국토교통부 실거래가 공식 데이터 활용
  </text>
</svg>
