<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Naver Map Debugger</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        #status { padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; }
        .error { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .success { background: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0; }
        #map { width: 100%; height: 400px; background: #f3f4f6; border-radius: 12px; }
        pre { background: #f8fafc; padding: 10px; border-radius: 6px; overflow-x: auto; font-size: 12px; }
    </style>
</head>
<body>
    <h1>Naver Map Debugger</h1>
    
    <div id="status">상태 확인 중...</div>
    
    <div style="margin-bottom: 20px;">
        <strong>현재 설정된 Client ID:</strong> <code id="client-id">4pawb5zngj</code><br>
        <strong>실제 Referer:</strong> <code id="referer-val">확인 중...</code>
    </div>

    <div id="map">지도가 여기에 표시됩니다.</div>

    <h3>Debug Log:</h3>
    <pre id="log"></pre>

    <script>
        const log = document.getElementById('log');
        const status = document.getElementById('status');
        const clientId = '4pawb5zngj'; // 사용자의 최신 ID
        
        function addLog(msg) {
            log.innerText += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
        }

        document.getElementById('referer-val').innerText = window.location.href;
        addLog('페이지 로드 완료');

        // SDK 로드 감시
        const script = document.createElement('script');
        const now = new Date().getTime();
        script.src = `https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=${clientId}&submodules=geocoder&t=${now}`;
        
        addLog(`SDK 요청 URL: ${script.src}`);

        script.onload = () => {
            addLog('SDK 스크립트 로드 성공 (200 OK)');
            if (window.naver && window.naver.maps) {
                status.innerText = '✅ SDK 로드 성공! 지도를 생성합니다.';
                status.className = 'success';
                try {
                    const map = new naver.maps.Map('map', {
                        center: new naver.maps.LatLng(37.5665, 126.9780),
                        zoom: 10
                    });
                    addLog('지도 객체 생성 완료');
                } catch (e) {
                    addLog(`지도 생성 에러: ${e.message}`);
                }
            } else {
                status.innerText = '❌ SDK는 로드되었으나 naver.maps 객체가 없습니다.';
                status.className = 'error';
            }
        };

        script.onerror = () => {
            status.innerText = '❌ SDK 로드 자체에 실패했습니다 (네트워크 오류)';
            status.className = 'error';
            addLog('SDK 로드 실패 (403 또는 404 가능성)');
        };

        // 네이버 인증 에러 캡처를 위한 전역 핸들러
        window.addEventListener('error', (e) => {
            if (e.message.includes('naver')) {
                addLog(`네이버 관련 에러 감지: ${e.message}`);
            }
        });

        document.head.appendChild(script);
    </script>
</body>
</html>
