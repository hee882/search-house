<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="hot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 로고 상단 배치 -->
  <g transform="translate(60, 50)">
    <rect width="60" height="60" rx="15" fill="url(#accent)"/>
    <text x="30" y="42" font-family="sans-serif" font-size="32" font-weight="900" fill="white" text-anchor="middle">S</text>
    <text x="80" y="42" font-family="sans-serif" font-size="28" font-weight="900" fill="white" letter-spacing="2">SEARCH HOUSE</text>
  </g>

  <!-- 메인 카피: 텍스트 크기 극대화 (모바일용) -->
  <text x="60" y="200" font-family="sans-serif" font-size="72" font-weight="900" fill="white" letter-spacing="-2">
    매일 왕복 2시간 통근
  </text>
  <text x="60" y="310" font-family="sans-serif" font-size="110" font-weight="900" fill="url(#hot)" letter-spacing="-5">
    = 연간 20일 소멸
  </text>

  <!-- 서브 카피 -->
  <text x="60" y="400" font-family="sans-serif" font-size="42" font-weight="800" fill="#94a3b8">
    당신의 시간은 얼마인가요?
  </text>

  <!-- 하단 비교 영역: 여백 줄이고 카드 크기 확대 -->
  <g transform="translate(60, 450)">
    <!-- 실제 지출 -->
    <rect width="520" height="130" rx="20" fill="white" opacity="0.07"/>
    <text x="30" y="50" font-family="sans-serif" font-size="24" font-weight="800" fill="#94a3b8">실제 지출</text>
    <text x="30" y="105" font-family="sans-serif" font-size="64" font-weight="900" fill="white">87<tspan font-size="28" fill="#64748b"> 만/월</tspan></text>

    <!-- 보이지 않는 비용 -->
    <rect x="560" width="520" height="130" rx="20" fill="#f97316" opacity="0.15"/>
    <text x="590" y="50" font-family="sans-serif" font-size="24" font-weight="800" fill="#fb923c">보이지 않는 비용 (기회비용)</text>
    <text x="590" y="105" font-family="sans-serif" font-size="64" font-weight="900" fill="#f97316">142<tspan font-size="28" fill="#fb923c"> 만/월</tspan></text>
  </g>

  <!-- 하단 바 -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#accent)" opacity="0.5"/>
</svg>
