<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:white; stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:white; stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2dd4bf"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" />
    </filter>
  </defs>

  <!-- 1. 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 2. 도시 실루엣 레이어 (Glow 효과) -->
  <g fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.15">
    <path d="M0 630 L100 630 L100 400 L180 400 L180 500 L250 500 L250 350 L320 350 L320 550 L400 550 L400 300 L500 300 L500 600 L600 600 L600 450 L700 450 L700 520 L800 520 L800 380 L900 380 L900 580 L1000 580 L1000 320 L1100 320 L1100 630 L1200 630"/>
    <path opacity="0.5" d="M50 630 L150 630 L150 450 L230 450 L230 520 L300 520 L300 400 L370 400 L370 600 L450 600 L450 350 L550 350 L550 630"/>
  </g>

  <!-- 3. 메인 콘텐츠 카드 (Overlay) -->
  <rect x="60" y="60" width="1080" height="510" rx="40" fill="url(#card-grad)" stroke="white" stroke-width="1" stroke-opacity="0.1"/>
  
  <!-- 로고 -->
  <g transform="translate(110, 110)">
    <rect width="60" height="60" rx="15" fill="url(#accent)"/>
    <text x="30" y="42" font-family="sans-serif" font-size="32" font-weight="900" fill="white" text-anchor="middle">S</text>
    <text x="85" y="42" font-family="sans-serif" font-size="28" font-weight="900" fill="white" letter-spacing="3">SEARCH HOUSE</text>
  </g>

  <!-- 메인 카피 -->
  <text x="110" y="240" font-family="sans-serif" font-size="48" font-weight="800" fill="#94a3b8" letter-spacing="-1">
    부자들은 통근 시간을 삽니다.
  </text>
  <text x="110" y="340" font-family="sans-serif" font-size="82" font-weight="900" fill="white" letter-spacing="-3">
    당신의 시간 가치는 <tspan fill="#3b82f6">월 100만원</tspan>
  </text>

  <!-- 기준 정보 배지 -->
  <g transform="translate(110, 380)">
    <rect width="380" height="44" rx="22" fill="#3b82f6" fill-opacity="0.2" stroke="#3b82f6" stroke-opacity="0.3"/>
    <text x="190" y="28" font-family="sans-serif" font-size="18" font-weight="800" fill="#60a5fa" text-anchor="middle">
      연봉 5,000만원 · 08:00 도착 시뮬레이션
    </text>
  </g>

  <!-- 우측 하단 신호등 UI 요소 (Concept representation) -->
  <g transform="translate(750, 150)">
    <rect width="280" height="180" rx="30" fill="black" fill-opacity="0.3" stroke="white" stroke-opacity="0.1"/>
    <circle cx="60" cy="60" r="15" fill="#10b981"/> <!-- Green -->
    <circle cx="60" cy="100" r="15" fill="#f59e0b"/> <!-- Orange -->
    <circle cx="60" cy="140" r="15" fill="#ef4444"/> <!-- Red -->
    <text x="95" y="66" font-family="sans-serif" font-size="16" font-weight="800" fill="white">20% 이내: 양호</text>
    <text x="95" y="106" font-family="sans-serif" font-size="16" font-weight="800" fill="white">30% 이내: 주의</text>
    <text x="95" y="146" font-family="sans-serif" font-size="16" font-weight="800" fill="white">40% 이상: 위험</text>
  </g>

  <!-- CTA -->
  <g transform="translate(110, 460)">
    <rect width="320" height="70" rx="35" fill="url(#accent)"/>
    <text x="160" y="44" font-family="sans-serif" font-size="24" font-weight="900" fill="white" text-anchor="middle">최적 입지 스캐닝 →</text>
  </g>

  <!-- 푸터 -->
  <text x="110" y="615" font-family="sans-serif" font-size="16" font-weight="700" fill="#475569">
    수도권 620+ 역세권 실시간 분석  ·  국토교통부 실거래가 공식 데이터
  </text>
</svg>
